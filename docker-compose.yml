services:
  mongo:
    image: mongo:7
    container_name: arena-mongo
    restart: unless-stopped
    command: ["--auth"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root_password
      MONGO_INITDB_DATABASE: arena
    volumes:
      - mongo_data:/data/db
    networks:
      - arena_private
    ports:
      - '27017:27017'

  redis:
    image: redis:7-alpine
    container_name: arena-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - arena_private
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    container_name: arena-api
    restart: unless-stopped
    env_file:
      - apps/api/.env.example
    environment:
      MONGO_URI: mongodb://root:root_password@mongo:27017/arena?authSource=admin
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5173
      PORT: 3000
    volumes:
      - .:/workspace
      - /workspace/node_modules
    depends_on:
      - mongo
      - redis
    networks:
      - arena_private
      - arena_public
    ports:
      - '3000:3000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    container_name: arena-web
    restart: unless-stopped
    env_file:
      - apps/web/.env.example
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_SOCKET_URL: http://localhost:3000
    volumes:
      - .:/workspace
      - /workspace/node_modules
    depends_on:
      - api
    networks:
      - arena_public
    ports:
      - '5173:5173'

  nginx:
    image: nginx:1.27-alpine
    container_name: arena-nginx
    restart: unless-stopped
    profiles: ['with-nginx']
    depends_on:
      - web
      - api
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - arena_public
    ports:
      - '8080:80'

volumes:
  mongo_data:

networks:
  arena_private:
    internal: true
  arena_public:
